[www]

user = www-data
group = www-data

listen = 127.0.0.1:9000

; Allow environment variables from the container to reach PHP-FPM workers.
; This is required so the image entrypoint can set XDEBUG_CONFIG dynamically
; (e.g. to force an IPv4-resolved client_host on Docker Desktop).
clear_env = no

pm = dynamic
pm.max_children = 50
pm.start_servers = 16
pm.min_spare_servers = 8
pm.max_spare_servers = 24

; Respawn workers if they hang too long (helps avoid container death and worker exhaustion)
; Note: turn this off if debugging with Xdebug as it will cut off your debugging session
request_terminate_timeout = 180s

; Max requests per worker before respawning (helps prevent memory leaks)
pm.max_requests = 500

; Optional: log slow requests
request_slowlog_timeout = 5s
slowlog = /var/log/php-fpm-slow.log

; Enable FPM status endpoint (you can curl this from inside container)
pm.status_path = /fpm-status

; Set a few useful PHP admin values (optional)
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/fpm-php.www.log
php_admin_value[memory_limit] = 1024M
